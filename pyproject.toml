[project]
name = "cyber-defense-copilot"
version = "0.1.0"
description = "AI-native, case-centric SOC analyst workbench (Capstone Project 9: Cyber Defense Copilot)"
readme = "README.md"
requires-python = ">=3.11"
license = { file = "LICENSE" }

[tool.setuptools.packages.find]
include = ["core*", "apps*"]

# ---------------------------------------------------------------------------
# Ruff — linting + import-order. Configured in docs/engineering-standards.md.
# ---------------------------------------------------------------------------
[tool.ruff]
line-length = 100
target-version = "py311"
src = ["core", "apps", "tests", "scripts"]
extend-exclude = [
  "data/sample_evidence",       # intentionally-vulnerable fixtures, never linted
  "core/db/migrations/versions", # Alembic-autogenerated, hand-reviewed not hand-formatted
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "N"]
ignore = []

# Streamlit's own multi-page convention requires numeric-prefixed page
# filenames for sidebar ordering (blueprint §6: `1_Case_Dashboard.py`, etc.)
# — a deliberate, framework-mandated exception to N999's module-name rule,
# not a style lapse.
[tool.ruff.lint.per-file-ignores]
"apps/web/pages/*.py" = ["N999"]
"apps/web/Home.py" = ["N999"]

[tool.ruff.lint.isort]
known-first-party = ["core", "apps"]

# FastAPI's parameter-declaration idiom is a call-as-default by design
# (`limit: int = Query(default=50)`) — not the mutable-default-argument
# bug B008 exists to catch.
[tool.ruff.lint.flake8-bugbear]
extend-immutable-calls = ["fastapi.Query", "fastapi.Path", "fastapi.File", "fastapi.Body"]

# ---------------------------------------------------------------------------
# mypy — strict typing on core/, relaxed on apps/ presentation glue.
# ---------------------------------------------------------------------------
[tool.mypy]
python_version = "3.11"
warn_unused_ignores = true
warn_redundant_casts = true
no_implicit_optional = true

[[tool.mypy.overrides]]
module = "core.*"
disallow_untyped_defs = true
disallow_incomplete_defs = true

[[tool.mypy.overrides]]
module = "apps.*"
disallow_untyped_defs = false

# plotly and reportlab ship no py.typed marker / stub package (core/reporting's
# chart/PDF renderers are this repo's first consumers of either) — the
# standard mypy convention for an untyped third-party dependency, not a
# suppression of a real type error.
[[tool.mypy.overrides]]
module = ["plotly.*", "reportlab.*"]
ignore_missing_imports = true

# ---------------------------------------------------------------------------
# pytest
# ---------------------------------------------------------------------------
[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
  "unit: fast, pure-function tests (default tier)",
  "integration: full LangGraph investigation runs against sample evidence",
  "golden: report snapshot comparison tests",
]
