# Declarative label set for this repository. Not auto-applied by GitHub —
# sync with the GitHub CLI:
#   gh label list --json name,color,description | ... (compare)
#   for each below: gh label create "<name>" --color "<color>" --description "<description>" --force
# or wire up a label-sync GitHub Action (e.g. micnncim/action-label-syncer)
# pointed at this file.

