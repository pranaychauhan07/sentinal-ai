# OWASP Top 10:2021 — vendored, offline reference content for
# core/knowledge/owasp/ (ADR-0027). Hand-curated summary of the publicly
# published OWASP Top 10:2021 taxonomy (https://owasp.org/Top10/), used only
# as read-only reference content the AI Analyst Chat can cite — this is NOT
# the OWASP static-analysis detection engine (core/owasp_security,
# core/owasp_web), which is unrelated and untouched by this data.
version: "2021"
categories:
  - id: "A01:2021"
    name: "Broken Access Control"
    description: >
      Restrictions on what authenticated users are allowed to do are not
      properly enforced. Attackers can exploit these flaws to access
      unauthorized functionality or data, such as accessing other users'
      accounts, viewing sensitive files, modifying other users' data, or
      changing access rights.
    remediation: >
      Deny by default except for public resources; implement access control
      once and reuse it; enforce record ownership rather than trusting
      client-supplied identifiers; log access-control failures and alert on
      repeated attempts; rate-limit API and controller access.
  - id: "A02:2021"
    name: "Cryptographic Failures"
    description: >
      Failures related to cryptography (or the absence of it) that often
      lead to exposure of sensitive data — previously "Sensitive Data
      Exposure." Includes transmitting data in clear text, using weak or
      deprecated cryptographic algorithms, and improper key management.
    remediation: >
      Classify data processed/stored/transmitted and identify what needs
      encryption; encrypt data in transit with up-to-date TLS; encrypt data
      at rest; use strong, adaptive, salted hashing for passwords; disable
      caching for responses containing sensitive data.
  - id: "A03:2021"
    name: "Injection"
    description: >
      User-supplied data is not validated, filtered, or sanitized before
      being interpreted as part of a command or query (SQL, NoSQL, OS
      command, LDAP injection); includes Cross-Site Scripting.
    remediation: >
      Use parameterized queries / prepared statements or an ORM; validate
      input against an allowlist; escape special characters for the
      interpreter in use; use context-aware output encoding to prevent XSS.
  - id: "A04:2021"
    name: "Insecure Design"
    description: >
      Risks related to design and architectural flaws, distinct from
      implementation bugs — missing or ineffective control design, such as
      no threat modeling, insufficient business-logic validation, or
      designs that assume trust where none is warranted.
    remediation: >
      Establish and use a secure development lifecycle with threat
      modeling; use reference architectures/design patterns; write unit and
      integration tests for critical business logic and abuse cases.
  - id: "A05:2021"
    name: "Security Misconfiguration"
    description: >
      Missing appropriate security hardening, improperly configured
      permissions, unnecessary features enabled, default accounts/passwords
      unchanged, overly informative error messages, or out-of-date software.
    remediation: >
      Establish a repeatable hardening process across environments; remove
      unused features/frameworks/dependencies; review and update
      configurations as part of patch management; segment application
      architecture.
  - id: "A06:2021"
    name: "Vulnerable and Outdated Components"
    description: >
      Using components (libraries, frameworks, and other software modules)
      with known vulnerabilities, or that are unsupported/out of date,
      without knowing their versions or monitoring for new vulnerabilities.
    remediation: >
      Inventory component versions and their dependencies continuously;
      monitor sources like CVE/NVD for vulnerabilities in used components;
      obtain components only from official sources; remove unused
      dependencies and features.
  - id: "A07:2021"
    name: "Identification and Authentication Failures"
    description: >
      Confirmation of a user's identity, authentication, and session
      management is implemented incorrectly, allowing attackers to
      compromise passwords, keys, session tokens, or exploit implementation
      flaws to assume other users' identities — previously "Broken
      Authentication."
    remediation: >
      Implement multi-factor authentication; do not ship or use default
      credentials; implement weak-password checks; use a server-side,
      secure session manager that generates a new random session ID after
      login.
  - id: "A08:2021"
    name: "Software and Data Integrity Failures"
    description: >
      Code and infrastructure that does not protect against integrity
      violations, such as relying on plugins/libraries/modules from
      untrusted sources without verifying integrity (e.g. insecure
      deserialization, unsigned CI/CD pipelines).
    remediation: >
      Use digital signatures to verify software or data is from the
      expected source; ensure CI/CD pipeline has proper access control and
      configuration; ensure unsigned or unencrypted serialized data is not
      sent to untrusted clients without integrity checks.
  - id: "A09:2021"
    name: "Security Logging and Monitoring Failures"
    description: >
      Insufficient logging, detection, monitoring, and active response
      allows attackers to further attack systems, maintain persistence,
      pivot, and tamper/extract/destroy data without detection.
    remediation: >
      Log all authentication, access-control, and server-side input
      validation failures with enough context for delayed forensic
      analysis; ensure logs are generated in a format consumable by SIEM
      tools; establish effective monitoring and alerting so suspicious
      activity is detected and responded to in a timely manner.
  - id: "A10:2021"
    name: "Server-Side Request Forgery (SSRF)"
    description: >
      An application fetches a remote resource without validating the
      user-supplied URL, allowing an attacker to coerce the application into
      sending a crafted request to an unexpected destination, including
      internal-only services behind a firewall or VPC.
    remediation: >
      Sanitize and validate all client-supplied input data used to build a
      remote resource request; enforce "deny by default" firewall policies
      for URL schemas, ports, and destinations; disable HTTP redirections;
      do not send raw responses to clients.
