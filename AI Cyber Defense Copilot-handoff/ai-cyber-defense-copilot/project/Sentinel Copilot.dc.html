<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<meta name="color-scheme" content="dark">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #0a0b0e; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; }
  ::selection { background: rgba(122,162,255,0.35); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #262a33; border-radius: 6px; }
  ::-webkit-scrollbar-thumb:hover { background: #323744; }
  a { color: #7aa2ff; text-decoration: none; }
  a:hover { color: #9cb9ff; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulseDot { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  @keyframes shimmer { 0% { background-position: -200px 0; } 100% { background-position: calc(200px + 100%) 0; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  .fade-in { animation: fadeIn 0.32s ease both; }
</style>
</helmet>

<sc-if value="{{ isAuthFlow }}" hint-placeholder-val="{{ true }}">
  <dc-import name="AuthFlow" auth-stage="{{ authStage }}" on-login="{{ handleLogin }}" on-mfa="{{ handleMfaSuccess }}" on-ready="{{ handleSessionReady }}" style="position:fixed;inset:0" hint-size="100%,100%"></dc-import>
</sc-if>

<sc-if value="{{ isApp }}" hint-placeholder-val="{{ false }}">
  <dc-import name="AppShell" screen="{{ screen }}" go-to="{{ goTo }}" selected-case="{{ selectedCase }}" select-case="{{ selectCase }}" style="position:fixed;inset:0" hint-size="100%,100%"></dc-import>
</sc-if>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { authStage: 'login', screen: 'dashboard', selectedCaseId: 'CASE-2049' };

  handleLogin = () => this.setState({ authStage: 'mfa' });
  handleMfaSuccess = () => this.setState({ authStage: 'loading' });
  handleSessionReady = () => this.setState({ authStage: 'app' });
  goTo = (screenId) => this.setState({ screen: screenId });
  selectCase = (caseId) => this.setState({ screen: 'caseDetail', selectedCaseId: caseId });

  renderVals() {
    const authStage = this.state.authStage;
    return {
      isAuthFlow: authStage !== 'app',
      isApp: authStage === 'app',
      authStage,
      screen: this.state.screen,
      handleLogin: this.handleLogin,
      handleMfaSuccess: this.handleMfaSuccess,
      handleSessionReady: this.handleSessionReady,
      goTo: this.goTo,
      selectCase: this.selectCase,
      selectedCase: this.state.selectedCaseId,
    };
  }
}

</script>
</body>
</html>
